<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AminLogic QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
    --primary: #2b6fff;
    --primary-grad: linear-gradient(135deg, #3da3ff, #216bff);
    --card-bg: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.1);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(circle at top, #1a233a 0%, #05070f 100%);
    color: white;
    height: 100vh;
    overflow: hidden; /* Strictly no scrolling */
    display: flex;
    flex-direction: column;
}

.container {
    max-width: 450px;
    margin: 0 auto;
    padding: 10px 15px;
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
}

.header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    flex-shrink: 0;
}

.logo { width: 40px; height: 40px; border-radius: 10px; }
.title h1 { margin: 0; font-size: 17px; font-weight: 800; }
.title span { font-size: 10px; color: #3da3ff; font-weight: 600; text-transform: uppercase; }

.card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 15px;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
}

.description { font-size: 11px; color: rgba(255, 255, 255, 0.5); line-height: 1.3; margin: 0; }

textarea {
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    color: white;
    font-size: 14px;
    height: 60px;
    box-sizing: border-box;
    outline: none;
    resize: none;
}

.qrbox {
    padding: 12px;
    border-radius: 18px;
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    align-self: center;
    margin: 2px 0;
}

.branding-tag { color: #000; font-size: 10px; font-weight: 900; margin-top: 5px; letter-spacing: 2px; }

button { border: none; border-radius: 12px; padding: 12px; font-weight: 700; font-size: 13px; cursor: pointer; flex: 1; transition: 0.2s; }
button:active { transform: scale(0.98); }

.btnrow { display: flex; gap: 8px; }
.generate { background: var(--primary-grad); color: white; }
.share { background: linear-gradient(135deg, #44ffb1, #1abf7e); color: #04281b; }
.copy { background: rgba(255, 255, 255, 0.1); color: white; }

/* History Optimization */
#history { display:none; flex-direction: column; flex: 1; overflow: hidden; }
#historyList { flex: 1; overflow-y: auto; margin-top: 5px; }
.historyItem { background: rgba(255, 255, 255, 0.04); padding: 10px; border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); }
.history-text { font-size: 12px; opacity: 0.8; word-break: break-all; display: block; margin-bottom: 5px; }

/* Bottom Nav */
.tabs { background: rgba(6, 9, 18, 0.98); padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; text-align: center; padding: 12px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); cursor: pointer; font-weight: 700; color: rgba(255, 255, 255, 0.4); font-size: 13px; }
.tab.active { background: var(--primary); color: white; }

/* Capture Mode Overlay */
#screenshot-overlay {
    display: none;
    position: fixed;
    top:0; left:0; width:100vw; height:100vh;
    background: white;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.instr-main { color: #000; font-weight: 800; font-size: 18px; margin: 0; }
.instr-sub { color: #666; font-size: 12px; margin: 4px 0 20px 0; }

.close-overlay { margin-top: 40px; background: #000; color: white; padding: 14px 40px; border-radius: 50px; font-weight: bold; }
</style>
</head>

<body>

<div id="screenshot-overlay">
    <p class="instr-main">QR Ready</p>
    <p class="instr-sub">(Please take a screenshot to save)</p>
    
    <div id="overlay-qr-space" style="padding: 15px; background: white; border: 1px solid #eee; border-radius: 12px;"></div>
    
    <div style="color: #000; margin-top: 20px; font-weight: 900; letter-spacing: 4px; font-size: 14px;">AMINLOGIC</div>
    
    <button class="close-overlay" onclick="closeCapture()">Return</button>
</div>

<div class="container">
    <div class="header">
        <img src="icon-512.png" class="logo">
        <div class="title">
            <h1>AminLogic QR</h1>
            <span>Instant QR. Infinite Possibilities.</span>
        </div>
    </div>

    <div id="generator" style="display: flex; flex-direction: column; gap: 8px; flex: 1; overflow: hidden;">
        <div class="card">
            <p class="description">Generate high-quality codes for URLs or text instantly.</p>
            <textarea id="qrtext" placeholder="Enter URL or text content..."></textarea>
            
            <div class="btnrow">
                <button class="generate" onclick="generateQR()">Generate</button>
                <button class="copy" onclick="copyText()">Copy</button>
            </div>

            <div class="qrbox">
                <div id="qrcode"></div>
                <div class="branding-tag">AMINLOGIC</div>
            </div>

            <div class="btnrow">
                <button class="share" onclick="openCapture()">Capture Mode</button>
                <button class="copy" onclick="saveQR()">Save Vault</button>
            </div>
        </div>
    </div>

    <div id="history">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0; font-size: 16px;">Vault</h2>
            <span id="historyCount" style="background: var(--primary); padding: 2px 10px; border-radius: 10px; font-size: 11px;">0</span>
        </div>
        <div id="historyList"></div>
        <button onclick="clearHistory()" style="background:rgba(255,78,107,0.1); color:#ff4e6b; margin-top:5px; flex-shrink:0;">Wipe All</button>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="openTab('generator',this)">Create</div>
    <div class="tab" onclick="openTab('history',this)">Vault</div>
</div>

<script>
let qr;
window.onload = function() {
    qr = new QRCode(document.getElementById("qrcode"), {
        text: "https://aminlogic.com",
        width: 160, height: 160,
        colorDark: "#000000", colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
    loadHistory();
};

function generateQR() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    qr.makeCode(text);
}

function openCapture() {
    const text = document.getElementById("qrtext").value || "https://aminlogic.com";
    const overlaySpace = document.getElementById("overlay-qr-space");
    overlaySpace.innerHTML = "";
    new QRCode(overlaySpace, { text: text, width: 220, height: 220, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
    document.getElementById("screenshot-overlay").style.display = "flex";
}

function closeCapture() { document.getElementById("screenshot-overlay").style.display = "none"; }
function copyText() { let text = document.getElementById("qrtext").value; if(!text) return; navigator.clipboard.writeText(text); alert("Copied!"); }

function saveQR() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    let history = JSON.parse(localStorage.getItem("qrhistory") || "[]");
    history.unshift({ text: text });
    localStorage.setItem("qrhistory", JSON.stringify(history.slice(0, 10)));
    loadHistory();
}

function loadHistory() {
    let list = document.getElementById("historyList");
    let countLabel = document.getElementById("historyCount");
    list.innerHTML = "";
    let history = JSON.parse(localStorage.getItem("qrhistory") || "[]");
    countLabel.innerText = history.length;
    history.forEach((item, i) => {
        let div = document.createElement("div");
        div.className = "historyItem";
        div.innerHTML = `<span class="history-text">${item.text}</span>
            <div class="btnrow"><button class="generate" onclick="useHistory(${i})" style="padding: 5px; font-size:11px;">View</button>
            <button class="copy" onclick="delHistory(${i})" style="padding: 5px; font-size:11px; color:#ff4e6b;">Del</button></div>`;
        list.appendChild(div);
    });
}

function useHistory(i) {
    let history = JSON.parse(localStorage.getItem("qrhistory"));
    document.getElementById("qrtext").value = history[i].text;
    qr.makeCode(history[i].text);
    openCapture();
}

function delHistory(i) {
    let history = JSON.parse(localStorage.getItem("qrhistory"));
    history.splice(i, 1);
    localStorage.setItem("qrhistory", JSON.stringify(history));
    loadHistory();
}

function clearHistory() { if(confirm("Clear Vault?")) { localStorage.removeItem("qrhistory"); loadHistory(); } }

function openTab(name, el) {
    document.getElementById("generator").style.display = (name === 'generator') ? "flex" : "none";
    document.getElementById("history").style.display = (name === 'history') ? "flex" : "none";
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>

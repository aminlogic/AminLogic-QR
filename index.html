<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AminLogic QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
    --primary: #2b6fff;
    --primary-grad: linear-gradient(135deg, #3da3ff, #216bff);
    --accent-grad: linear-gradient(135deg, #44ffb1, #1abf7e);
    --danger: #ff4e6b;
    --card-bg: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.15);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at top, #1a233a 0%, #05070f 100%);
    color: white;
    height: 100vh;
    overflow: hidden; /* Strictly no scrolling */
    display: flex;
    flex-direction: column;
}

.container {
    max-width: 450px;
    margin: 0 auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
}

/* Header Section */
.header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 12px;
    flex-shrink: 0;
}

.logo-img {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.title-group h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
}

.title-group span {
    font-size: 11px;
    color: #3da3ff;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Main UI Card */
.card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 20px;
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    justify-content: space-between;
    overflow: hidden;
}

.intro-text {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.4;
    margin: 0;
}

textarea {
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 14px;
    color: white;
    font-size: 15px;
    height: 80px;
    box-sizing: border-box;
    outline: none;
    resize: none;
    transition: 0.3s;
}

textarea:focus { border-color: var(--primary); background: rgba(0,0,0,0.6); }

/* QR Center Box */
.qr-display-container {
    background: white;
    padding: 15px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    align-self: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.qr-branding {
    color: #000;
    font-size: 11px;
    font-weight: 900;
    margin-top: 8px;
    letter-spacing: 3px;
}

/* Buttons */
.btn-row { display: flex; gap: 10px; }

button {
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    flex: 1;
    transition: transform 0.1s;
}

button:active { transform: scale(0.96); }

.btn-primary { background: var(--primary-grad); color: white; }
.btn-accent { background: var(--accent-grad); color: #04281b; }
.btn-ghost { background: rgba(255, 255, 255, 0.1); color: white; }
.btn-danger { background: rgba(255, 78, 107, 0.1); color: var(--danger); border: 1px solid rgba(255, 78, 107, 0.2); }

/* History Section */
#history-view {
    display: none;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
}

#history-list {
    flex: 1;
    overflow-y: auto;
    margin-top: 10px;
}

.history-item {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    border-radius: 18px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
}

.history-content {
    font-size: 14px;
    opacity: 0.8;
    word-break: break-all;
    display: block;
    margin-bottom: 10px;
}

/* Bottom Navigation */
.nav-tabs {
    background: #060912;
    padding: 12px 20px;
    display: flex;
    gap: 12px;
    border-top: 1px solid var(--border);
}

.tab-item {
    flex: 1;
    text-align: center;
    padding: 14px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.05);
    cursor: pointer;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.4);
    font-size: 14px;
}

.tab-item.active { background: var(--primary); color: white; }

/* Capture Overlay (Matching your image) */
#capture-view {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: white;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.cap-header {
    color: #999;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 40px;
    font-size: 14px;
}

.cap-instruction {
    color: #666;
    font-size: 12px;
    margin-bottom: 10px;
}

.cap-qr-wrapper {
    padding: 10px;
    background: white;
}

.cap-footer-brand {
    color: #000;
    font-weight: 900;
    letter-spacing: 5px;
    margin-top: 40px;
    font-size: 16px;
}

.cap-close-btn {
    margin-top: 60px;
    background: #000;
    color: white;
    padding: 16px 50px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="capture-view">
    <div class="cap-header">PREVIEW & CAPTURE</div>
    <div class="cap-instruction">(Please screenshot to save)</div>
    <div class="cap-qr-wrapper" id="capture-qr-target"></div>
    <div class="cap-footer-brand">AMINLOGIC</div>
    <button class="cap-close-btn" onclick="closeCapture()">Return to App</button>
</div>

<div class="container">
    <div class="header">
        <img src="icon-512.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        <div class="title-group">
            <h1>AminLogic QR</h1>
            <span>Instant QR. Infinite Possibilities.</span>
        </div>
    </div>

    <div id="generator-view" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
        <div class="card">
            <div>
                <p class="intro-text">Create high-resolution QR codes for websites, text, or social profiles instantly.</p>
                <textarea id="qr-input" placeholder="Paste your URL or type content here..."></textarea>
                <div class="btn-row" style="margin-top: 10px;">
                    <button class="btn-primary" onclick="generateNow()">Generate Code</button>
                    <button class="btn-ghost" onclick="copyInput()">Copy Text</button>
                </div>
            </div>

            <div class="qr-display-container">
                <div id="main-qr-box"></div>
                <div class="qr-branding">AMINLOGIC</div>
            </div>

            <div class="btn-row">
                <button class="btn-accent" onclick="openCapture()">Capture Mode</button>
                <button class="btn-ghost" onclick="saveHistory()">Save to History</button>
            </div>
        </div>
    </div>

    <div id="history-view">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0; font-size: 18px;">History Log</h2>
            <span id="h-count" style="background: var(--primary); padding: 2px 12px; border-radius: 20px; font-size: 11px; font-weight: bold;">0 Items</span>
        </div>
        
        <div id="history-list"></div>

        <button class="btn-danger" onclick="clearAllHistory()" style="margin-top: 10px; flex-shrink: 0;">Wipe History</button>
    </div>
</div>

<div class="nav-tabs">
    <div class="tab-item active" onclick="switchTab('generator', this)">Generator</div>
    <div class="tab-item" onclick="switchTab('history', this)">History</div>
</div>

<script>
let mainQr;

window.onload = function() {
    // Initial QR setup
    mainQr = new QRCode(document.getElementById("main-qr-box"), {
        text: "AminLogic QR",
        width: 170,
        height: 170,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
    renderHistory();
};

function generateNow() {
    const input = document.getElementById("qr-input").value;
    if (input) {
        mainQr.makeCode(input);
    }
}

function copyInput() {
    const text = document.getElementById("qr-input").value;
    if (text) {
        navigator.clipboard.writeText(text);
        alert("Text copied to clipboard!");
    }
}

/* Capture Mode (Matches Image) */
function openCapture() {
    const text = document.getElementById("qr-input").value || "AminLogic QR";
    const target = document.getElementById("capture-qr-target");
    target.innerHTML = "";
    
    new QRCode(target, {
        text: text,
        width: 250,
        height: 250,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
    
    document.getElementById("capture-view").style.display = "flex";
}

function closeCapture() {
    document.getElementById("capture-view").style.display = "none";
}

/* History Logic */
function saveHistory() {
    const text = document.getElementById("qr-input").value;
    if (!text) return;

    let logs = JSON.parse(localStorage.getItem("qr_logs") || "[]");
    logs.unshift({ text: text, date: new Date().toLocaleDateString() });
    localStorage.setItem("qr_logs", JSON.stringify(logs.slice(0, 20))); // Keep last 20
    
    renderHistory();
    alert("Saved to History!");
}

function renderHistory() {
    const list = document.getElementById("history-list");
    const logs = JSON.parse(localStorage.getItem("qr_logs") || "[]");
    document.getElementById("h-count").innerText = logs.length + " Items";
    
    list.innerHTML = logs.length ? "" : '<p style="text-align:center; opacity:0.3; margin-top:50px;">No records found.</p>';
    
    logs.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
            <span class="history-content">${item.text}</span>
            <div class="btn-row">
                <button class="btn-primary" onclick="loadHistoryItem(${index})" style="padding: 8px; font-size: 12px;">View</button>
                <button class="btn-ghost" onclick="deleteHistoryItem(${index})" style="padding: 8px; font-size: 12px; color: #ff4e6b;">Delete</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function loadHistoryItem(index) {
    const logs = JSON.parse(localStorage.getItem("qr_logs"));
    document.getElementById("qr-input").value = logs[index].text;
    mainQr.makeCode(logs[index].text);
    switchTab('generator', document.querySelectorAll('.tab-item')[0]);
}

function deleteHistoryItem(index) {
    let logs = JSON.parse(localStorage.getItem("qr_logs"));
    logs.splice(index, 1);
    localStorage.setItem("qr_logs", JSON.stringify(logs));
    renderHistory();
}

function clearAllHistory() {
    if (confirm("Permanently clear all history?")) {
        localStorage.removeItem("qr_logs");
        renderHistory();
    }
}

/* Tab Navigation */
function switchTab(tab, el) {
    document.getElementById("generator-view").style.display = (tab === 'generator') ? "flex" : "none";
    document.getElementById("history-view").style.display = (tab === 'history') ? "flex" : "none";
    
    document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AminLogic QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#0d1222,#05070f);
color:white;
}

.container{
max-width:520px;
margin:auto;
padding:16px;
padding-bottom:100px;
}

.header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:18px;
}

.logo{
width:48px;
height:48px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

.title h1{
margin:0;
font-size:18px;
font-weight:800;
}

.title span{
font-size:12px;
opacity:.6;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:18px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card h2{
margin:0 0 8px 0;
font-size:16px;
}

.card p{
margin:0 0 14px 0;
font-size:13px;
opacity:.7;
}

textarea{
width:100%;
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
padding:12px;
color:white;
font-size:14px;
min-height:90px;
}

.qrbox{
margin-top:18px;
padding:14px;
border-radius:18px;
background:black;
display:flex;
justify-content:center;
}

button{
border:none;
border-radius:14px;
padding:12px 14px;
font-weight:700;
font-size:14px;
cursor:pointer;
flex:1;
}

.btnrow{
display:flex;
gap:10px;
margin-top:14px;
flex-wrap:wrap;
}

.generate{
background:linear-gradient(135deg,#3da3ff,#216bff);
color:white;
}

.share{
background:linear-gradient(135deg,#44ffb1,#1abf7e);
color:#04281b;
}

.copy{
background:rgba(255,255,255,0.08);
color:white;
}

.delete{
background:linear-gradient(135deg,#ff4e6b,#ff2747);
color:white;
}

.historyItem{
background:rgba(255,255,255,0.04);
padding:14px;
border-radius:14px;
margin-top:12px;
border:1px solid rgba(255,255,255,0.07);
}

.historyItem strong{
font-size:13px;
display:block;
margin-bottom:6px;
}

.historyItem span{
font-size:12px;
opacity:.7;
word-break:break-all;
}

.tabs{
position:fixed;
bottom:0;
left:0;
right:0;
background:#060912;
padding:10px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,0.08);
}

.tab{
flex:1;
text-align:center;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.05);
cursor:pointer;
font-weight:700;
}

.active{
background:#2b6fff;
}

footer{
text-align:center;
font-size:11px;
opacity:.5;
margin-top:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="icon-512.png" class="logo">
<div class="title">
<h1>AminLogic QR Generator</h1>
<span>Create • Share • Save</span>
</div>
</div>

<!-- GENERATOR -->

<div id="generator">

<div class="card">

<h2>QR Code Generator</h2>
<p>Create QR codes instantly and share anywhere.</p>

<textarea id="qrtext" placeholder="Enter URL, text, phone number, WiFi..."></textarea>

<div class="btnrow">
<button class="generate" onclick="generateQR()">Generate</button>
<button class="copy" onclick="copyText()">Copy</button>
</div>

<div class="qrbox">
<div id="qrcode"></div>
</div>

<div class="btnrow">
<button class="share" onclick="shareQR()">Share</button>
<button class="copy" onclick="saveQR()">Save</button>
</div>

</div>

</div>

<!-- HISTORY -->

<div id="history" style="display:none">

<div class="card">

<h2>Saved QR Codes</h2>

<div id="historyList"></div>

<div class="btnrow">
<button class="delete" onclick="clearHistory()">Clear History</button>
</div>

<footer>AminLogic</footer>

</div>

</div>

</div>

<!-- TABS -->

<div class="tabs">

<div class="tab active" onclick="openTab('generator',this)">Generator</div>

<div class="tab" onclick="openTab('history',this)">History</div>

</div>

<script>

let qr;

window.onload=function(){

qr=new QRCode(document.getElementById("qrcode"),{
text:"https://aminlogic.com",
width:220,
height:220,
colorDark:"#ffffff",
colorLight:"#000000",
correctLevel:QRCode.CorrectLevel.H
});

loadHistory();

};

function generateQR(){

let text=document.getElementById("qrtext").value;

if(!text)return;

document.getElementById("qrcode").innerHTML="";

qr=new QRCode(document.getElementById("qrcode"),{
text:text,
width:220,
height:220
});

}

function copyText(){

let text=document.getElementById("qrtext").value;

navigator.clipboard.writeText(text);

}

async function shareQR(){

let canvas=document.querySelector("#qrcode canvas");

if(!canvas)return;

canvas.toBlob(async function(blob){

let file=new File([blob],"aminlogic-qr.png",{type:"image/png"});

if(navigator.share){

await navigator.share({
title:"AminLogic QR Code",
text:document.getElementById("qrtext").value,
files:[file]
});

}

});

}

function saveQR(){

let text=document.getElementById("qrtext").value;

if(!text)return;

let history=JSON.parse(localStorage.getItem("qrhistory")||"[]");

history.unshift({
text:text,
date:new Date().toLocaleString()
});

localStorage.setItem("qrhistory",JSON.stringify(history));

loadHistory();

}

function loadHistory(){

let list=document.getElementById("historyList");

list.innerHTML="";

let history=JSON.parse(localStorage.getItem("qrhistory")||"[]");

history.forEach((item,i)=>{

let div=document.createElement("div");

div.className="historyItem";

div.innerHTML=`

<strong>${item.date}</strong>

<span>${item.text}</span>

<div class="btnrow">

<button class="share" onclick="shareHistory(${i})">Share</button>

<button class="copy" onclick="copyHistory(${i})">Copy</button>

<button class="delete" onclick="deleteHistory(${i})">Delete</button>

</div>

`;

list.appendChild(div);

});

}

function shareHistory(i){

let history=JSON.parse(localStorage.getItem("qrhistory"));

let text=history[i].text;

navigator.share({
title:"AminLogic QR Code",
text:text
});

}

function copyHistory(i){

let history=JSON.parse(localStorage.getItem("qrhistory"));

navigator.clipboard.writeText(history[i].text);

}

function deleteHistory(i){

let history=JSON.parse(localStorage.getItem("qrhistory"));

history.splice(i,1);

localStorage.setItem("qrhistory",JSON.stringify(history));

loadHistory();

}

function clearHistory(){

localStorage.removeItem("qrhistory");

loadHistory();

}

function openTab(name,el){

document.getElementById("generator").style.display="none";
document.getElementById("history").style.display="none";

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.getElementById(name).style.display="block";

el.classList.add("active");

}

</script>

</body>
</html>

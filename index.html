<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AminLogic QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
    --primary:#2b6fff;
    --primary-grad:linear-gradient(135deg,#3da3ff,#216bff);
    --success-grad:linear-gradient(135deg,#44ffb1,#1abf7e);
    --danger-grad:linear-gradient(135deg,#ff4e6b,#ff2747);
    --card-bg:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.1);
}

body{
margin:0;
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:radial-gradient(circle at top,#1a233a 0%,#05070f 100%);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

.container{
max-width:500px;
margin:auto;
padding:18px;
padding-bottom:100px;
flex:1;
}

.header{
display:flex;
align-items:center;
gap:14px;
margin-bottom:18px;
}

.logo{
width:54px;
height:54px;
border-radius:16px;
box-shadow:0 8px 24px rgba(0,0,0,0.5);
}

.title h1{
margin:0;
font-size:22px;
font-weight:800;
letter-spacing:-0.5px;
}

.title span{
font-size:13px;
color:#3da3ff;
font-weight:600;
text-transform:uppercase;
letter-spacing:1px;
}

.card{
background:var(--card-bg);
border-radius:24px;
padding:22px;
margin-bottom:15px;
border:1px solid var(--border);
box-shadow:0 15px 35px rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.card h2{
margin:0 0 6px 0;
font-size:19px;
}

.description{
font-size:14px;
color:rgba(255,255,255,0.6);
margin-bottom:16px;
line-height:1.5;
}

textarea{
width:100%;
background:rgba(0,0,0,0.4);
border:1px solid var(--border);
border-radius:16px;
padding:16px;
color:white;
font-size:15px;
min-height:100px;
box-sizing:border-box;
outline:none;
resize:none;
transition:0.3s;
}

textarea:focus{
border-color:var(--primary);
background:rgba(0,0,0,0.5);
}

.qrbox{
margin-top:18px;
padding:22px;
border-radius:24px;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.branding-tag{
color:#05070f;
font-size:12px;
font-weight:900;
margin-top:10px;
letter-spacing:3px;
opacity:0.9;
}

button{
border:none;
border-radius:16px;
padding:14px;
font-weight:700;
font-size:14px;
cursor:pointer;
flex:1;
transition:0.2s;
}

button:active{transform:scale(0.97);}

.btnrow{
display:flex;
gap:10px;
margin-top:14px;
}

.generate{background:var(--primary-grad);color:white;}
.share{background:var(--success-grad);color:#04281b;}
.copy{background:rgba(255,255,255,0.1);color:white;}
.delete{background:var(--danger-grad);color:white;}

.historyItem{
background:rgba(255,255,255,0.04);
padding:18px;
border-radius:20px;
margin-bottom:14px;
border:1px solid var(--border);
}

.history-meta{
display:flex;
justify-content:space-between;
font-size:12px;
color:#3da3ff;
margin-bottom:8px;
font-weight:600;
}

.history-text{
font-size:14px;
opacity:0.9;
word-break:break-all;
line-height:1.4;
display:block;
margin-bottom:12px;
}

.tabs{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(6,9,18,0.98);
padding:14px 18px;
display:flex;
gap:12px;
border-top:1px solid var(--border);
z-index:100;
}

.tab{
flex:1;
text-align:center;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,0.05);
cursor:pointer;
font-weight:700;
color:rgba(255,255,255,0.5);
}

.tab.active{
background:var(--primary);
color:white;
}

#screenshot-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:white;
z-index:9999;
flex-direction:column;
align-items:center;
justify-content:center;
}

.close-overlay{
position:absolute;
bottom:50px;
background:#05070f;
color:white;
padding:16px 40px;
border-radius:50px;
font-weight:bold;
border:none;
}
</style>
</head>

<body>

<div id="screenshot-overlay">
<div style="color:#999;margin-bottom:25px;font-weight:bold;letter-spacing:1px;">PREVIEW & CAPTURE</div>
<div id="overlay-qr-space" style="padding:20px;background:white;"></div>
<div style="color:#000;margin-top:25px;font-weight:900;letter-spacing:4px;font-size:16px;">AMINLOGIC</div>
<button class="close-overlay" onclick="closeCapture()">Return to App</button>
</div>

<div class="container">

<div class="header">
<img src="icon-512.png" class="logo">
<div class="title">
<h1>AminLogic QR</h1>
<span>Instant QR. Infinite Possibilities.</span>
</div>
</div>

<div id="generator">

<div class="card">
<p class="description">Generate QR codes instantly from any website link or plain text message. </p>

<textarea id="qrtext" placeholder="Enter a website URL or text to convert into a QR code..."></textarea>

<div class="btnrow">
<button class="generate" onclick="generateQR()">Generate Code</button>
<button class="copy" onclick="copyText()">Copy Input</button>
</div>

<div class="qrbox">
<div id="qrcode"></div>
<div class="branding-tag">AMINLOGIC PREMIERE</div>
</div>

<div class="btnrow" style="margin-top:18px;">
<button class="share" onclick="openCapture()">Capture & Save</button>
<button class="copy" onclick="saveQR()">Store in History</button>
</div>

</div>

</div>

<div id="history" style="display:none">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
<h2 style="margin:0">History</h2>
<span id="historyCount" style="background:#216bff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;">0 Items</span>
</div>

<div id="historyList"></div>

<div id="emptyHistory" style="text-align:center;padding:60px 20px;opacity:0.4;">
<p>Your history is empty. Generate and save QR codes to see them here.</p>
</div>

<div class="btnrow" id="clearBtnRow" style="display:none;margin-top:20px;">
<button class="delete" onclick="clearHistory()">Clear All History</button>
</div>

</div>

</div>

<div class="tabs">
<div class="tab active" onclick="openTab('generator',this)">Create</div>
<div class="tab" onclick="openTab('history',this)">History</div>
</div>

<script>

let qr;

window.onload=function(){
qr=new QRCode(document.getElementById("qrcode"),{
text:"QR Code",
width:240,
height:240,
colorDark:"#000000",
colorLight:"#ffffff",
correctLevel:QRCode.CorrectLevel.H
});
loadHistory();
};

function generateQR(){
let text=document.getElementById("qrtext").value;
if(!text){alert("Please enter a URL or text first.");return;}
qr.makeCode(text);
}

function openCapture(){

const text=document.getElementById("qrtext").value || "QR Code";

const overlaySpace=document.getElementById("overlay-qr-space");
overlaySpace.innerHTML="";

new QRCode(overlaySpace,{
text:text,
width:280,
height:280,
colorDark:"#000000",
colorLight:"#ffffff",
correctLevel:QRCode.CorrectLevel.H
});

document.getElementById("screenshot-overlay").style.display="flex";
}

function closeCapture(){
document.getElementById("screenshot-overlay").style.display="none";
}

function copyText(){
let text=document.getElementById("qrtext").value;
if(!text)return;
navigator.clipboard.writeText(text);
alert("Input copied!");
}

function saveQR(){

let text=document.getElementById("qrtext").value;
if(!text)return;

let history=JSON.parse(localStorage.getItem("qrhistory")||"[]");

if(history.length>0 && history[0].text===text)return;

history.unshift({
text:text,
date:new Date().toLocaleDateString()+" "+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
});

localStorage.setItem("qrhistory",JSON.stringify(history.slice(0,30)));

loadHistory();

alert("Saved to History!");

}

function loadHistory(){

let list=document.getElementById("historyList");
let empty=document.getElementById("emptyHistory");
let clearBtn=document.getElementById("clearBtnRow");
let countLabel=document.getElementById("historyCount");

list.innerHTML="";

let history=JSON.parse(localStorage.getItem("qrhistory")||"[]");

countLabel.innerText=history.length+" Items";

if(history.length===0){

empty.style.display="block";
clearBtn.style.display="none";

}else{

empty.style.display="none";
clearBtn.style.display="flex";

history.forEach((item,i)=>{

let div=document.createElement("div");

div.className="historyItem";

div.innerHTML=`
<div class="history-meta"><span>${item.date}</span></div>
<span class="history-text">${item.text}</span>
<div class="btnrow">
<button class="generate" onclick="captureHistory(${i})" style="padding:10px;font-size:12px;">Capture</button>
<button class="delete" onclick="deleteHistory(${i})" style="padding:10px;font-size:12px;background:rgba(255,78,107,0.1);color:#ff4e6b;">Remove</button>
</div>`;

list.appendChild(div);

});

}

}

function captureHistory(i){

let history=JSON.parse(localStorage.getItem("qrhistory"));

document.getElementById("qrtext").value=history[i].text;

qr.makeCode(history[i].text);

openCapture();

}

function deleteHistory(i){

let history=JSON.parse(localStorage.getItem("qrhistory"));

history.splice(i,1);

localStorage.setItem("qrhistory",JSON.stringify(history));

loadHistory();

}

function clearHistory(){

if(confirm("Clear all history records?")){

localStorage.removeItem("qrhistory");

loadHistory();

}

}

function openTab(name,el){

document.getElementById("generator").style.display=(name==='generator')?"block":"none";

document.getElementById("history").style.display=(name==='history')?"block":"none";

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

el.classList.add("active");

}

</script>

</body>
</html>

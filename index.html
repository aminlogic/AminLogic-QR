<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AminLogic QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#0d1222,#05070f);
color:white;
min-height: 100vh;
}

.container{
max-width:520px;
margin:auto;
padding:16px;
padding-bottom:100px;
}

.header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:18px;
}

.logo{
width:48px;
height:48px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

.title h1{
margin:0;
font-size:18px;
font-weight:800;
}

.title span{
font-size:12px;
opacity:.6;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:18px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card h2{
margin:0 0 8px 0;
font-size:16px;
}

textarea{
width:100%;
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
padding:12px;
color:white;
font-size:14px;
min-height:90px;
box-sizing: border-box;
outline: none;
}

.qrbox{
margin-top:18px;
padding:14px;
border-radius:18px;
background:white;
display:flex;
justify-content:center;
min-height: 220px;
position: relative;
}

/* Fix: Ensure the generated image fills the container */
#qrcode img {
    width: 220px;
    height: 220px;
}

button{
border:none;
border-radius:14px;
padding:12px 14px;
font-weight:700;
font-size:14px;
cursor:pointer;
flex:1;
}

.btnrow{
display:flex;
gap:10px;
margin-top:14px;
flex-wrap:wrap;
}

.generate{ background:linear-gradient(135deg,#3da3ff,#216bff); color:white; }
.share{ background:linear-gradient(135deg,#44ffb1,#1abf7e); color:#04281b; }
.copy{ background:rgba(255,255,255,0.08); color:white; }
.delete{ background:linear-gradient(135deg,#ff4e6b,#ff2747); color:white; }

.historyItem{
background:rgba(255,255,255,0.04);
padding:14px;
border-radius:14px;
margin-top:12px;
border:1px solid rgba(255,255,255,0.07);
}

.tabs{
position:fixed;
bottom:0;
left:0;
right:0;
background:#060912;
padding:10px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,0.08);
}

.tab{
flex:1;
text-align:center;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.05);
cursor:pointer;
font-weight:700;
}

.active{ background:#2b6fff; }

/* Overlay for the 'Long Press to Save' fix */
#downloadOverlay {
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}
#downloadOverlay img {
    border: 10px solid white;
    border-radius: 10px;
    margin-bottom: 20px;
    max-width: 80%;
}
</style>
</head>

<body>

<div id="downloadOverlay" onclick="this.style.display='none'">
    <p>LONG-PRESS IMAGE TO SAVE</p>
    <div id="overlayImg"></div>
    <p style="font-size: 12px; opacity: 0.7;">(Tap anywhere to close)</p>
</div>

<div class="container">
    <div class="header">
        <img src="icon-512.png" class="logo">
        <div class="title">
            <h1>AminLogic QR Generator</h1>
            <span>Create • Share • Save</span>
        </div>
    </div>

    <div id="generator">
        <div class="card">
            <h2>QR Code Generator</h2>
            <textarea id="qrtext" placeholder="Enter URL or text..."></textarea>
            
            <div class="btnrow">
                <button class="generate" onclick="generateQR()">Generate</button>
                <button class="copy" onclick="copyText()">Copy Text</button>
            </div>

            <div class="qrbox">
                <div id="qrcode"></div>
            </div>

            <div class="btnrow">
                <button class="share" onclick="openDownloadOverlay()">Download</button>
                <button class="copy" onclick="saveToHistory()">Save History</button>
            </div>
        </div>
    </div>

    <div id="history" style="display:none">
        <div class="card">
            <h2>History</h2>
            <div id="historyList"></div>
            <div class="btnrow">
                <button class="delete" onclick="clearHistory()">Clear All</button>
            </div>
        </div>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="openTab('generator',this)">Generator</div>
    <div class="tab" onclick="openTab('history',this)">History</div>
</div>

<script>
let qr;

window.onload = function() {
    // Initial QR Code Generation
    qr = new QRCode(document.getElementById("qrcode"), {
        text: "https://aminlogic.com",
        width: 220,
        height: 220,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
    loadHistory();
};

function generateQR() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    qr.clear();
    qr.makeCode(text);
}

function openDownloadOverlay() {
    const canvas = document.querySelector("#qrcode canvas");
    if(!canvas) return;
    
    const dataUrl = canvas.toDataURL("image/png");
    document.getElementById("overlayImg").innerHTML = `<img src="${dataUrl}">`;
    document.getElementById("downloadOverlay").style.display = "flex";
}

function copyText() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    navigator.clipboard.writeText(text);
    alert("Text copied!");
}

function saveToHistory() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    let history = JSON.parse(localStorage.getItem("qrhistory") || "[]");
    history.unshift({ text: text, date: new Date().toLocaleString() });
    localStorage.setItem("qrhistory", JSON.stringify(history));
    loadHistory();
    alert("Saved!");
}

function loadHistory() {
    let list = document.getElementById("historyList");
    let history = JSON.parse(localStorage.getItem("qrhistory") || "[]");
    list.innerHTML = history.length ? "" : "<p style='text-align:center;opacity:0.5'>No history</p>";

    history.forEach((item, i) => {
        let div = document.createElement("div");
        div.className = "historyItem";
        div.innerHTML = `
            <strong>${item.date}</strong><br>
            <span style="font-size:12px;opacity:0.7;word-break:break-all;">${item.text}</span>
            <div class="btnrow">
                <button class="generate" onclick="loadItem(${i})">Use</button>
                <button class="delete" onclick="deleteHistory(${i})">Delete</button>
            </div>`;
        list.appendChild(div);
    });
}

function loadItem(i) {
    let history = JSON.parse(localStorage.getItem("qrhistory"));
    document.getElementById("qrtext").value = history[i].text;
    generateQR();
    openTab('generator', document.querySelectorAll('.tab')[0]);
}

function deleteHistory(i) {
    let history = JSON.parse(localStorage.getItem("qrhistory"));
    history.splice(i, 1);
    localStorage.setItem("qrhistory", JSON.stringify(history));
    loadHistory();
}

function clearHistory() {
    if(confirm("Clear all?")) {
        localStorage.removeItem("qrhistory");
        loadHistory();
    }
}

function openTab(name, el) {
    document.getElementById("generator").style.display = name === "generator" ? "block" : "none";
    document.getElementById("history").style.display = name === "history" ? "block" : "none";
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>

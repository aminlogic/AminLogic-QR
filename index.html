<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AminLogic QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#0d1222,#05070f);
color:white;
min-height: 100vh;
}

.container{ max-width:520px; margin:auto; padding:16px; padding-bottom:100px; }

.header{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.logo{ width:48px; height:48px; border-radius:14px; background:#216bff; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:10px; }

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:18px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.08);
}

textarea{
width:100%;
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
padding:12px;
color:white;
box-sizing: border-box;
outline: none;
min-height: 80px;
}

/* This is the area we "Snapshot" */
.capture-area {
    background: white;
    padding: 20px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 15px;
}

#qrcode { margin-bottom: 10px; }

.branding-remark {
    color: #0d1222;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    opacity: 0.8;
}

button{
border:none;
border-radius:14px;
padding:14px;
font-weight:700;
cursor:pointer;
flex:1;
}

.btnrow{ display:flex; gap:10px; margin-top:14px; }
.generate{ background:linear-gradient(135deg,#3da3ff,#216bff); color:white; }
.share{ background:linear-gradient(135deg,#44ffb1,#1abf7e); color:#04281b; }
.copy{ background:rgba(255,255,255,0.1); color:white; }

.historyItem{
background:rgba(255,255,255,0.04);
padding:15px;
border-radius:14px;
margin-top:10px;
border:1px solid rgba(255,255,255,0.07);
}

.tabs{ position:fixed; bottom:0; left:0; right:0; background:#060912; padding:10px; display:flex; gap:10px; border-top:1px solid rgba(255,255,255,0.1); }
.tab{ flex:1; text-align:center; padding:12px; border-radius:12px; background:rgba(255,255,255,0.05); cursor:pointer; }
.active{ background:#2b6fff; }

/* Result Overlay */
#result-overlay {
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
#result-image { max-width: 90%; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
</style>
</head>

<body>

<div id="result-overlay">
    <h3 style="margin-bottom:10px">QR Ready!</h3>
    <p style="font-size:12px; opacity:0.8; margin-bottom:20px">Hold image to Save or Share</p>
    <img id="result-image" src="" alt="Result">
    <button class="copy" style="margin-top:20px; flex:none; width:150px" onclick="document.getElementById('result-overlay').style.display='none'">Close</button>
</div>

<div class="container">
    <div class="header">
        <div class="logo">AMIN</div>
        <div class="title">
            <h1>AminLogic QR</h1>
            <span style="opacity:0.6; font-size:12px">Premium QR Generator</span>
        </div>
    </div>

    <div id="generator-tab">
        <div class="card">
            <textarea id="qr-input" placeholder="Paste link here..."></textarea>
            <div class="btnrow">
                <button class="generate" onclick="generateNow()">Generate</button>
            </div>

            <div class="capture-area" id="target">
                <div id="qrcode"></div>
                <div class="branding-remark">AMINLOGIC PREMIERE</div>
            </div>

            <div class="btnrow">
                <button class="share" onclick="takeSnapshot()">Share / Save</button>
                <button class="copy" onclick="saveToHistory()">History</button>
            </div>
        </div>
    </div>

    <div id="history-tab" style="display:none">
        <div class="card">
            <h2>History</h2>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('generator-tab', this)">Create</div>
    <div class="tab" onclick="switchTab('history-tab', this)">History</div>
</div>

<script>
let qr;
window.onload = function() {
    qr = new QRCode(document.getElementById("qrcode"), {
        text: "https://aminlogic.com",
        width: 200,
        height: 200,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
};

function generateNow() {
    let val = document.getElementById("qr-input").value;
    if(val) qr.makeCode(val);
}

// THE "AUTOMATIC SCREENSHOT" SOLUTION
function takeSnapshot() {
    const target = document.getElementById("target");
    
    html2canvas(target, {
        backgroundColor: null,
        scale: 2 // High resolution
    }).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const overlay = document.getElementById("result-overlay");
        const resultImg = document.getElementById("result-image");
        
        resultImg.src = imgData;
        overlay.style.display = "flex";
        
        // Attempt to trigger native share if available, 
        // otherwise the user sees the image to save.
        if (navigator.share) {
            fetch(imgData).then(res => res.blob()).then(blob => {
                const file = new File([blob], "AminLogic_QR.png", {type: "image/png"});
                navigator.share({
                    files: [file],
                    title: 'AminLogic QR',
                }).catch(err => console.log("Share failed, showing image instead."));
            });
        }
    });
}

function saveToHistory() {
    let val = document.getElementById("qr-input").value;
    if(!val) return;
    let hist = JSON.parse(localStorage.getItem("qr_hist") || "[]");
    hist.unshift({text: val, date: new Date().toLocaleDateString()});
    localStorage.setItem("qr_hist", JSON.stringify(hist));
    alert("Saved!");
    renderHistory();
}

function renderHistory() {
    let list = document.getElementById("history-list");
    let hist = JSON.parse(localStorage.getItem("qr_hist") || "[]");
    list.innerHTML = hist.map(item => `
        <div class="historyItem">
            <div style="font-size:10px; opacity:0.5">${item.date}</div>
            <div style="font-size:13px; margin:5px 0">${item.text}</div>
        </div>
    `).join('');
}

function switchTab(id, el) {
    document.getElementById("generator-tab").style.display = "none";
    document.getElementById("history-tab").style.display = "none";
    document.getElementById(id).style.display = "block";
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    if(id === 'history-tab') renderHistory();
}
</script>

</body>
</html>

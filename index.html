<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AminLogic QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
    --primary: #2b6fff;
    --primary-grad: linear-gradient(135deg, #3da3ff, #216bff);
    --success-grad: linear-gradient(135deg, #44ffb1, #1abf7e);
    --danger-grad: linear-gradient(135deg, #ff4e6b, #ff2747);
    --card-bg: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.1);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(circle at top, #1a233a 0%, #05070f 100%);
    color: white;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.container {
    max-width: 450px;
    margin: 0 auto;
    padding: 12px 15px;
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
}

.header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

.logo { width: 42px; height: 42px; border-radius: 12px; }

.title h1 { margin: 0; font-size: 18px; font-weight: 800; }
.title span { font-size: 11px; color: #3da3ff; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

.card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 15px;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.description {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.3;
    margin: 0;
}

textarea {
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    color: white;
    font-size: 14px;
    height: 65px;
    box-sizing: border-box;
    outline: none;
    resize: none;
}

.qrbox {
    padding: 12px;
    border-radius: 18px;
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    align-self: center;
}

.branding-tag {
    color: #05070f;
    font-size: 10px;
    font-weight: 900;
    margin-top: 6px;
    letter-spacing: 2px;
}

button {
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    flex: 1;
}

.btnrow { display: flex; gap: 8px; }
.generate { background: var(--primary-grad); color: white; }
.share { background: var(--success-grad); color: #04281b; }
.copy { background: rgba(255, 255, 255, 0.1); color: white; }
.delete { background: var(--danger-grad); color: white; }

#historyList {
    flex: 1;
    overflow-y: auto;
    margin-top: 8px;
}

.historyItem {
    background: rgba(255, 255, 255, 0.04);
    padding: 12px;
    border-radius: 15px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
}

.history-text { font-size: 13px; opacity: 0.8; word-break: break-all; display: block; margin-bottom: 8px; }

.tabs {
    background: rgba(6, 9, 18, 0.98);
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
}

.tab { flex: 1; text-align: center; padding: 12px; border-radius: 14px; background: rgba(255, 255, 255, 0.05); cursor: pointer; font-weight: 700; color: rgba(255, 255, 255, 0.5); font-size: 13px; }
.tab.active { background: var(--primary); color: white; }

/* Capture Mode Styling */
#screenshot-overlay {
    display: none;
    position: fixed;
    top:0; left:0; width:100vw; height:100vh;
    background: white;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.instr-box { text-align: center; margin-bottom: 20px; }
.instr-main { color: #000; font-weight: 800; font-size: 18px; margin: 0; }
.instr-hint { color: #666; font-size: 13px; margin: 4px 0 0 0; font-weight: 500; }

.close-overlay { margin-top: 40px; background: #05070f; color: white; padding: 14px 35px; border-radius: 50px; font-weight: bold; border: none; }
</style>
</head>

<body>

<div id="screenshot-overlay">
    <div class="instr-box">
        <p class="instr-main">QR Preview Ready</p>
        <p class="instr-hint">(Please screenshot to save your code)</p>
    </div>
    
    <div id="overlay-qr-space" style="padding: 15px; background: white; border: 1px solid #eee; border-radius: 15px;"></div>
    
    <div style="color: #000; margin-top: 20px; font-weight: 900; letter-spacing: 4px; font-size: 14px;">AMINLOGIC</div>
    
    <button class="close-overlay" onclick="closeCapture()">Back to App</button>
</div>

<div class="container">
    <div class="header">
        <img src="icon-512.png" class="logo">
        <div class="title">
            <h1>AminLogic QR</h1>
            <span>Instant QR. Infinite Possibilities.</span>
        </div>
    </div>

    <div id="generator" style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
        <div class="card">
            <p class="description">Generate high-quality QR codes for any destination instantly.</p>
            <textarea id="qrtext" placeholder="Enter your URL or text content here..."></textarea>
            
            <div class="btnrow">
                <button class="generate" onclick="generateQR()">Generate Now</button>
                <button class="copy" onclick="copyText()">Copy Text</button>
            </div>

            <div class="qrbox">
                <div id="qrcode"></div>
                <div class="branding-tag">AMINLOGIC PREMIERE</div>
            </div>

            <div class="btnrow">
                <button class="share" onclick="openCapture()">Capture Mode</button>
                <button class="copy" onclick="saveQR()">Add to Vault</button>
            </div>
        </div>
    </div>

    <div id="history" style="display:none; flex-direction: column; flex: 1; overflow: hidden;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <h2 style="margin:0; font-size: 16px;">Digital Vault</h2>
            <span id="historyCount" style="background: #216bff; padding: 2px 10px; border-radius: 10px; font-size: 11px;">0</span>
        </div>
        
        <div id="historyList"></div>

        <div id="emptyHistory" style="text-align: center; padding: 40px 10px; opacity: 0.4; font-size: 13px;">
            <p>Your saved records will appear here.</p>
        </div>

        <button class="delete" id="clearBtn" onclick="clearHistory()" style="margin-top: 8px; display: none; flex: none;">Wipe Vault</button>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="openTab('generator',this)">Create</div>
    <div class="tab" onclick="openTab('history',this)">Vault</div>
</div>

<script>
let qr;
window.onload = function() {
    qr = new QRCode(document.getElementById("qrcode"), {
        text: "https://aminlogic.com",
        width: 170, height: 170,
        colorDark: "#000000", colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
    loadHistory();
};

function generateQR() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    qr.makeCode(text);
}

function openCapture() {
    const text = document.getElementById("qrtext").value || "https://aminlogic.com";
    const overlaySpace = document.getElementById("overlay-qr-space");
    overlaySpace.innerHTML = "";
    new QRCode(overlaySpace, { text: text, width: 240, height: 240, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
    document.getElementById("screenshot-overlay").style.display = "flex";
}

function closeCapture() { document.getElementById("screenshot-overlay").style.display = "none"; }
function copyText() { let text = document.getElementById("qrtext").value; if(!text) return; navigator.clipboard.writeText(text); alert("Text Copied!"); }

function saveQR() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    let history = JSON.parse(localStorage.getItem("qrhistory") || "[]");
    history.unshift({ text: text, date: new Date().toLocaleDateString() });
    localStorage.setItem("qrhistory", JSON.stringify(history.slice(0, 15)));
    loadHistory();
    alert("Saved!");
}

function loadHistory() {
    let list = document.getElementById("historyList");
    let empty = document.getElementById("emptyHistory");
    let clearBtn = document.getElementById("clearBtn");
    let countLabel = document.getElementById("historyCount");
    list.innerHTML = "";
    let history = JSON.parse(localStorage.getItem("qrhistory") || "[]");
    countLabel.innerText = history.length;
    if(history.length === 0) { empty.style.display = "block"; clearBtn.style.display = "none"; } 
    else {
        empty.style.display = "none"; clearBtn.style.display = "block";
        history.forEach((item, i) => {
            let div = document.createElement("div");
            div.className = "historyItem";
            div.innerHTML = `<span class="history-text">${item.text}</span>
                <div class="btnrow"><button class="generate" onclick="captureHistory(${i})" style="padding: 6px;">View</button>
                <button class="delete" onclick="deleteHistory(${i})" style="padding: 6px; background: rgba(255,78,107,0.1); color: #ff4e6b;">Delete</button></div>`;
            list.appendChild(div);
        });
    }
}

function captureHistory(i) {
    let history = JSON.parse(localStorage.getItem("qrhistory"));
    document.getElementById("qrtext").value = history[i].text;
    qr.makeCode(history[i].text);
    openCapture();
}

function deleteHistory(i) {
    let history = JSON.parse(localStorage.getItem("qrhistory"));
    history.splice(i, 1);
    localStorage.setItem("qrhistory", JSON.stringify(history));
    loadHistory();
}

function clearHistory() { if(confirm("Clear Vault?")) { localStorage.removeItem("qrhistory"); loadHistory(); } }

function openTab(name, el) {
    document.getElementById("generator").style.display = (name === 'generator') ? "flex" : "none";
    document.getElementById("history").style.display = (name === 'history') ? "flex" : "none";
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>

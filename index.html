<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AminLogic QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#0d1222,#05070f);
color:white;
min-height: 100vh;
}

.container{
max-width:520px;
margin:auto;
padding:16px;
padding-bottom:100px;
}

.header{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.logo{ width:48px; height:48px; border-radius:14px; box-shadow:0 6px 18px rgba(0,0,0,0.4); }
.title h1{ margin:0; font-size:18px; font-weight:800; }
.title span{ font-size:12px; opacity:.6; }

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:18px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

textarea{
width:100%;
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
padding:12px;
color:white;
font-size:14px;
min-height:90px;
box-sizing: border-box;
outline: none;
}

.qrbox{
margin-top:18px;
padding:20px;
border-radius:18px;
background:white;
display:flex;
justify-content:center;
min-height: 220px;
}

button{
border:none;
border-radius:14px;
padding:12px 14px;
font-weight:700;
font-size:14px;
cursor:pointer;
flex:1;
}

.btnrow{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.generate{ background:linear-gradient(135deg,#3da3ff,#216bff); color:white; }
.share{ background:linear-gradient(135deg,#44ffb1,#1abf7e); color:#04281b; }
.copy{ background:rgba(255,255,255,0.08); color:white; }
.delete{ background:linear-gradient(135deg,#ff4e6b,#ff2747); color:white; }

.historyItem{
background:rgba(255,255,255,0.04);
padding:14px;
border-radius:14px;
margin-top:12px;
border:1px solid rgba(255,255,255,0.07);
}

.tabs{
position:fixed;
bottom:0;
left:0;
right:0;
background:#060912;
padding:10px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,0.08);
}

.tab{ flex:1; text-align:center; padding:12px; border-radius:14px; background:rgba(255,255,255,0.05); cursor:pointer; font-weight:700; }
.active{ background:#2b6fff; }

/* SCREENSHOT MODE OVERLAY */
#screenshot-overlay {
    display: none;
    position: fixed;
    top:0; left:0; width:100vw; height:100vh;
    background: white;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.close-overlay {
    position: absolute;
    top: 40px;
    right: 20px;
    background: #ff2747;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
}
#overlay-qr-space { padding: 20px; background: white; }
</style>
</head>

<body>

<div id="screenshot-overlay">
    <button class="close-overlay" onclick="closeCapture()">Close</button>
    <div style="color: black; margin-bottom: 20px; font-weight: bold;">SCREENSHOT THIS SCREEN</div>
    <div id="overlay-qr-space"></div>
    <div style="color: #666; margin-top: 20px; font-size: 12px;">AminLogic QR Generator</div>
</div>

<div class="container" id="main-ui">
    <div class="header">
        <img src="icon-512.png" class="logo">
        <div class="title">
            <h1>AminLogic QR Generator</h1>
            <span>Create • Capture • Save</span>
        </div>
    </div>

    <div id="generator">
        <div class="card">
            <textarea id="qrtext" placeholder="Enter URL or text..."></textarea>
            
            <div class="btnrow">
                <button class="generate" onclick="generateQR()">Generate</button>
                <button class="copy" onclick="copyText()">Copy Text</button>
            </div>

            <div class="qrbox">
                <div id="qrcode"></div>
            </div>

            <div class="btnrow">
                <button class="share" onclick="openCapture()">Capture Mode</button>
                <button class="copy" onclick="saveQR()">Save History</button>
            </div>
        </div>
    </div>

    <div id="history" style="display:none">
        <div class="card">
            <h2>History</h2>
            <div id="historyList"></div>
            <div class="btnrow">
                <button class="delete" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>
</div>

<div class="tabs" id="tab-bar">
    <div class="tab active" onclick="openTab('generator',this)">Generator</div>
    <div class="tab" onclick="openTab('history',this)">History</div>
</div>

<script>
let qr;

window.onload = function() {
    qr = new QRCode(document.getElementById("qrcode"), {
        text: "https://aminlogic.com",
        width: 256,
        height: 256,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
    loadHistory();
};

function generateQR() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    qr.makeCode(text);
}

function openCapture() {
    const text = document.getElementById("qrtext").value || "https://aminlogic.com";
    const overlaySpace = document.getElementById("overlay-qr-space");
    overlaySpace.innerHTML = "";
    
    // Generate a fresh, high-res QR for the screenshot
    new QRCode(overlaySpace, {
        text: text,
        width: 300,
        height: 300
    });

    document.getElementById("screenshot-overlay").style.display = "flex";
}

function closeCapture() {
    document.getElementById("screenshot-overlay").style.display = "none";
}

function copyText() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    navigator.clipboard.writeText(text);
    alert("Text Copied!");
}

function saveQR() {
    let text = document.getElementById("qrtext").value;
    if(!text) return;
    let history = JSON.parse(localStorage.getItem("qrhistory") || "[]");
    history.unshift({ text: text, date: new Date().toLocaleString() });
    localStorage.setItem("qrhistory", JSON.stringify(history));
    loadHistory();
    alert("Saved!");
}

function loadHistory() {
    let list = document.getElementById("historyList");
    list.innerHTML = "";
    let history = JSON.parse(localStorage.getItem("qrhistory") || "[]");

    history.forEach((item, i) => {
        let div = document.createElement("div");
        div.className = "historyItem";
        div.innerHTML = `
            <strong>${item.date}</strong>
            <span style="font-size:12px;opacity:0.7;word-break:break-all;">${item.text}</span>
            <div class="btnrow">
                <button class="share" onclick="captureHistory(${i})">Capture</button>
                <button class="delete" onclick="deleteHistory(${i})">Delete</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function captureHistory(i) {
    let history = JSON.parse(localStorage.getItem("qrhistory"));
    document.getElementById("qrtext").value = history[i].text;
    openCapture();
}

function deleteHistory(i) {
    let history = JSON.parse(localStorage.getItem("qrhistory"));
    history.splice(i, 1);
    localStorage.setItem("qrhistory", JSON.stringify(history));
    loadHistory();
}

function clearHistory() {
    if(confirm("Clear all?")) {
        localStorage.removeItem("qrhistory");
        loadHistory();
    }
}

function openTab(name, el) {
    document.getElementById("generator").style.display = (name === 'generator') ? "block" : "none";
    document.getElementById("history").style.display = (name === 'history') ? "block" : "none";
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>

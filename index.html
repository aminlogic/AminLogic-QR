<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AminLogic QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
    --primary:#2b6fff;
    --primary-grad:linear-gradient(135deg,#3da3ff,#216bff);
    --success-grad:linear-gradient(135deg,#44ffb1,#1abf7e);
    --danger-grad:linear-gradient(135deg,#ff4e6b,#ff2747);
    --card-bg:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.1);
}

body{
margin:0;
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:radial-gradient(circle at top,#1a233a 0%,#05070f 100%);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

.container{
max-width:450px;
margin:auto;
padding:10px;
padding-bottom:10px;
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between;
height:100vh;
}

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.logo{
width:48px;
height:48px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.title h1{
margin:0;
font-size:20px;
font-weight:800;
}

.title span{
font-size:12px;
color:#3da3ff;
font-weight:600;
text-transform:uppercase;
letter-spacing:1px;
}

.card{
background:var(--card-bg);
border-radius:20px;
padding:16px;
margin-bottom:10px;
border:1px solid var(--border);
box-shadow:0 12px 30px rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
flex:1;
}

.card h2{
margin:0 0 6px 0;
font-size:18px;
}

.description{
font-size:13px;
color:rgba(255,255,255,0.6);
margin-bottom:10px;
line-height:1.4;
text-align:center;
}

textarea{
width:100%;
background:rgba(0,0,0,0.4);
border:1px solid var(--border);
border-radius:14px;
padding:12px;
color:white;
font-size:14px;
min-height:80px;
box-sizing:border-box;
outline:none;
resize:none;
transition:0.3s;
}

textarea:focus{
border-color:var(--primary);
background:rgba(0,0,0,0.5);
}

.qrbox{
margin-top:10px;
padding:18px;
border-radius:20px;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.branding-tag{
color:#05070f;
font-size:11px;
font-weight:900;
margin-top:8px;
letter-spacing:2px;
opacity:0.9;
}

button{
border:none;
border-radius:14px;
padding:12px;
font-weight:700;
font-size:13px;
cursor:pointer;
flex:1;
transition:0.2s;
}

button:active{transform:scale(0.97);}

.btnrow{
display:flex;
gap:8px;
margin-top:10px;
}

.generate{background:var(--primary-grad);color:white;}
.share{background:var(--success-grad);color:#04281b;}
.copy{background:rgba(255,255,255,0.1);color:white;}
.delete{background:var(--danger-grad);color:white;}

.tabs{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(6,9,18,0.98);
padding:12px 16px;
display:flex;
gap:8px;
border-top:1px solid var(--border);
z-index:100;
}

.tab{
flex:1;
text-align:center;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.05);
cursor:pointer;
font-weight:700;
color:rgba(255,255,255,0.5);
}

.tab.active{
background:var(--primary);
color:white;
}

#screenshot-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:white;
z-index:9999;
flex-direction:column;
align-items:center;
justify-content:center;
}

.close-overlay{
position:absolute;
bottom:40px;
background:#05070f;
color:white;
padding:14px 36px;
border-radius:50px;
font-weight:bold;
border:none;
}
</style>
</head>

<body>

<div id="screenshot-overlay">
<div style="color:#999;margin-bottom:20px;font-weight:bold;letter-spacing:1px;">PREVIEW & CAPTURE</div>
<div id="overlay-qr-space" style="padding:18px;background:white;"></div>
<div style="color:#000;margin-top:20px;font-weight:900;letter-spacing:4px;font-size:16px;">AMINLOGIC</div>
<button class="close-overlay" onclick="closeCapture()">Return to App</button>
</div>

<div class="container">

<div class="header">
<img src="icon-512.png" class="logo">
<div class="title">
<h1>AminLogic QR</h1>
<span>Instant QR. Infinite Possibilities.</span>
</div>
</div>

<div id="generator" style="flex:1; display:flex; flex-direction:column; justify-content:space-between;">

<div class="card">
<h2>Create New Code</h2>
<p class="description">Generate QR codes from any URL or text instantly.</p>

<textarea id="qrtext" placeholder="Enter URL or text here..."></textarea>

<div class="btnrow">
<button class="generate" onclick="generateQR()">Generate</button>
<button class="copy" onclick="copyText()">Copy Input</button>
</div>

<div class="qrbox">
<div id="qrcode"></div>
<div class="branding-tag">AMINLOGIC PREMIERE</div>
</div>

<div class="btnrow">
<button class="share" onclick="openCapture()">Capture & Save</button>
<button class="copy" onclick="saveQR()">Store in History</button>
</div>

</div>

</div>

<div id="history" style="display:none">
<h2 style="margin-bottom:10px">History</h2>
<span id="historyCount" style="background:#216bff;padding:4px 10px;border-radius:18px;font-size:12px;font-weight:bold;">0 Items</span>
<div id="historyList" style="margin-top:8px"></div>
</div>

</div>

<div class="tabs">
<div class="tab active" onclick="openTab('generator',this)">Create</div>
<div class="tab" onclick="openTab('history',this)">History</div>
</div>

<script>
let qr;
window.onload=function(){
qr=new QRCode(document.getElementById("qrcode"),{
text:"QR Code",
width:200,
height:200,
colorDark:"#000000",
colorLight:"#ffffff",
correctLevel:QRCode.CorrectLevel.H
});
loadHistory();
};

function generateQR(){
let text=document.getElementById("qrtext").value;
if(!text){alert("Enter a URL or text!");return;}
qr.makeCode(text);
}

function openCapture(){
const text=document.getElementById("qrtext").value||"QR Code";
const overlaySpace=document.getElementById("overlay-qr-space");
overlaySpace.innerHTML="";
new QRCode(overlaySpace,{text:text,width:240,height:240,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});
document.getElementById("screenshot-overlay").style.display="flex";
}

function closeCapture(){document.getElementById("screenshot-overlay").style.display="none";}
function copyText(){let text=document.getElementById("qrtext").value;if(!text)return;navigator.clipboard.writeText(text);alert("Copied!");}

function saveQR(){
let text=document.getElementById("qrtext").value;
if(!text)return;
let history=JSON.parse(localStorage.getItem("qrhistory")||"[]");
if(history.length>0 && history[0].text===text)return;
history.unshift({text:text,date:new Date().toLocaleDateString()+" "+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})});
localStorage.setItem("qrhistory",JSON.stringify(history.slice(0,30)));
loadHistory();
alert("Saved to History!");
}

function loadHistory(){
let list=document.getElementById("historyList");
let countLabel=document.getElementById("historyCount");
list.innerHTML="";
let history=JSON.parse(localStorage.getItem("qrhistory")||"[]");
countLabel.innerText=history.length+" Items";
if(history.length>0){
history.forEach((item,i)=>{
let div=document.createElement("div");
div.className="historyItem";
div.innerHTML=`<div class="history-meta"><span>${item.date}</span></div>
<span class="history-text">${item.text}</span>`;
list.appendChild(div);
});
}
}

function openTab(name,el){
document.getElementById("generator").style.display=(name==='generator')?"flex":"none";
document.getElementById("history").style.display=(name==='history')?"block":"none";
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}
</script>

</body>
</html>
